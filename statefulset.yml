---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
spec:
  serviceName: "db"
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata: 
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: manisha03b/pythonapp:dbimage
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: app-secret

          resources:
              requests:
                cpu: "250m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "500Mi"


